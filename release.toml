# cargo-release configuration (https://github.com/crate-ci/cargo-release).
#
# This config tells cargo-release to bump the crate version in a single
# commit, but to NOT publish, tag or push. The rest of the release pipeline
# is owned by scripts/release.sh (which handles the CHANGELOG graduation and
# opens the PR) and by .github/workflows/release.yml (which publishes to
# crates.io and creates the GitHub Release once the human pushes the tag).

allow-branch = ["release/*"]
publish = false
tag = false
push = false
sign-commit = false
sign-tag = false

pre-release-commit-message = "release(v{{version}}): bump isochron to {{version}}"
