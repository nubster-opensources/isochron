name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish in --dry-run mode (no upload)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release

      - name: Determine publish mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "args=--dry-run" >> "$GITHUB_OUTPUT"
            echo "is_dry=true" >> "$GITHUB_OUTPUT"
            echo "Publishing in DRY-RUN mode"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "is_dry=false" >> "$GITHUB_OUTPUT"
            echo "Publishing for real to crates.io"
          fi

      - name: Build (dry-run only, catches compile errors)
        if: steps.mode.outputs.is_dry == 'true'
        run: cargo build --all-features --release

      - name: Publish isochron
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish ${{ steps.mode.outputs.args }}

  github-release:
    name: Create release
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([0-9A-Za-z.+-]*)$ ]]; then
            echo "error: tag '$VERSION' is not a valid semver" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Extract changelog section
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          awk -v v="[$VERSION]" '
            $0 ~ "^## " v {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "No changelog section found for [$VERSION]; using a placeholder."
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." > release-notes.md
          fi
          echo "--- Release notes preview ---"
          cat release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release-notes.md
